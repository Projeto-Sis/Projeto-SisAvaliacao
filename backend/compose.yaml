services:
  database:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: sisavalia
      POSTGRES_USER: sisavalia
      POSTGRES_PASSWORD: sisavalia_local
    ports:
      - "5432:5432"
    volumes:
      - sisavalia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sisavalia -d sisavalia"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  sisavalia_postgres_data:

